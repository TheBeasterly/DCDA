<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCDA Home</title>
    <style>
        body { font-family: sans-serif; margin: 40px; text-align: center; background-color: #f8f9fa; }
        .container { max-width: 700px; margin: auto; background-color: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 30px; }
        .options a {
            display: block;
            background-color: #007bff;
            color: white;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            transition: background-color 0.2s ease;
        }
        .options a:hover { background-color: #0056b3; }
        .options a.browse { background-color: #6c757d; }
        .options a.browse:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Datacenter Data Analyzer</h1>
        <p>Welcome! Please choose an option:</p>
        <div class="options">
            <a href="{{ url_for('rvtools_analysis') }}">RVTools Analysis</a>
            <a href="{{ url_for('browse_existing') }}" class="browse">Browse Existing Projects</a>
            {# Add more options here later if needed #}
        </div>
    </div>
</body>
</html>
